name: CI — TypeScript & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm type-check
      - run: pnpm lint
      - run: pnpm build
